<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-POS | Kasir Pintar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🏎️ JS-POS Dashboard</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4>Menu Tersedia</h4>
                    <span class="badge bg-secondary" id="item-count">0 Produk</span>
                </div>
                <div class="row" id="product-grid">
                    <div class="col-12 text-center">
                        <p class="text-muted">Memuat menu balapan...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Keranjang Belanja 🛒</h5>
                    </div>
                    <div class="card-body">
                        <div id="cart-items" class="mb-3">
                            <p class="text-muted text-center">Keranjang masih kosong</p>
                        </div>
                        <hr>
                        <div class="d-flex justify-content-between h5">
                            <span>Total:</span>
                            <span id="cart-total">Rp 0</span>
                        </div>
                        <button class="btn btn-success w-100 mt-3" id="btn-checkout" disabled>
                            Bayar Sekarang
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
